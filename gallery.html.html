
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yomping of Yeovil | Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ===== GLOBAL STYLES ===== */
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #2f5d50;
      color: #ffffff;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 30px 20px;
    }

    /* ===== NAVIGATION ===== */
    nav {
      margin-top: 15px;
    }

    nav a {
      background-color: #ffd966;
      color: #2f5d50;
      text-decoration: none;
      font-weight: bold;
      padding: 10px 16px;
      margin: 5px;
      border-radius: 4px;
      display: inline-block;
    }

    nav a:hover {
      opacity: 0.9;
    }

    /* ===== MAIN CONTENT ===== */
    main {
      max-width: 1000px;
      margin: auto;
      padding: 30px 20px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      border-bottom: 3px solid #ffd966;
      padding-bottom: 6px;
    }

    /* ===== GALLERY ===== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 6px;
    }

	.gallery figure {
		margin: 0;
}

	.gallery figcaption {
  margin-top: 8px;
  font-size: 0.9rem;
  color: #e6f0ec;
  text-align: center;
}

    /* ===== FOOTER ===== */
    footer {
      background-color: #1f3f36;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header>

    <!-- ✅ SAME INLINE SVG LOGO AS HOME PAGE -->
    <svg width="140" height="140" viewBox="0 0 140 140"
      style="display:block;margin:0 auto 10px auto;">
      
      <circle cx="70" cy="70" r="65"
        fill="#f3f7f4"
        stroke="#2f5d50"
        stroke-width="4"/>
      
      <circle cx="70" cy="70" r="45" fill="#2f5d50"/>
      
      <path d="M20 60 Q70 40 120 60"
        stroke="#a8c4b8"
        stroke-width="2"
        fill="none"/>
      
      <path d="M20 80 Q70 100 120 80"
        stroke="#a8c4b8"
        stroke-width="2"
        fill="none"/>
      
      <text x="70" y="82"
        text-anchor="middle"
        font-size="40"
        fill="#ffd966"
        font-weight="bold">
        YOY
      </text>
    </svg>

    <!-- NAVIGATION -->
    <nav>
      <a href="home.html">Home</a>
      <a href="tours.html">Tours & Activities</a>
      <a href="gallery.html">Gallery</a>
      <a href="safety.html">Safety & Cancellation</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main>
    <h2>Gallery</h2>
	
	
<div class="gallery">

  <figure>
    <img src="images/Mendip Hills.jpg" alt="Mendip Hills">
    <figcaption>Mendip Hills</figcaption>
  </figure>

  <figure>
    <img src="images/porlock-common-exmoor-somerset-uk-autumn-heather-dawn-porlock-common-exmoor-somerset-uk-114081246.jpg" alt="Porlock Common, Exmoor">
    <figcaption>Porlock Common, Exmoor</figcaption>
  </figure>

  <figure>
    <img src="images/Quantocks-view.jpeg" alt="Quantock Hills view">
    <figcaption>Quantock Hills View</figcaption>
  </figure>

  <figure>
    <img src="images/war-memorial-at-ham-hill-country-park-somerset-uk-2R6TC5H.jpg" alt="Ham Hill Country Park war memorial">
    <figcaption>Ham Hill Country Park War Memorial</figcaption>
  </figure>

  


</div>



	</main>
	<!-- ===== FOOTER ===== -->
  <footer>
    <p>© 2026 Yomping of Yeovil. All rights reserved.</p>
  </footer>

</body>
</html>
